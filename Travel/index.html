<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <div class="container-fluid position">
    <div class="container">
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <img style="height:50px;" src="assets/image/logo.png" alt="">
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 d-flex justify-content-end">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#"><i class="ri-global-line"></i>EN|USD</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">App</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Help</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Recently viewed</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Sign up</a>
              </li>
            </ul>
            <button style="background-color: #FF5B00; color: white;" type="button"
              class="btn fw-bold  rounded-pill btn-light">Log in</button>
          </div>
        </div>
      </nav>
    </div>
  </div>
  <div class="container-fluid">
    <div class="container">
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
              <a class="nav-link active" aria-current="page" href="#">Popular regions</a>
              <a class="nav-link active" aria-current="page" href="#">Popular destinations</a>
              <a class="nav-link active" aria-current="page" href="#">Popular lamdmarks</a>
              <a class="nav-link active" aria-current="page" href="#">Explore Klook</a>
              <a class="nav-link active text-secondary-emphasis" aria-current="page" href="#">|</a>
              <a class="nav-link active" aria-current="page" href="#"> 🎁Gift cards</a>
            </div>
          </div>
        </div>
      </nav>
    </div>
  </div>
  <div class="container-fluid ">
    <div id="carouselExample" class="carousel slide position-relative">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="assets/image/img-1.webp" class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
          <img src="assets/image/img-2.webp" class="d-block w-100" alt="...">
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
      <div class="container position-absolute z-1">
      <h1>Your world of joy</h1>
      <p>From local escapes to far-flung adventures, find what makes you happy anytime, anywhere</p>
      <div class="d-flex justify-content-between align-items-center bg-body border col-6 gap-3 rounded">
        <div class="fw-medium text-secondary"><i class="ri-search-line"><input class="border-0" type="text"
              placeholder="teamlab planets tokyo ticket"></i></div>
        <button style="background-color: #FF5B00; color: white;" type="button"
          class="btn fw-bold py-2 px-3 rounded btn-light">Search</button>
      </div>
    </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

</html>
