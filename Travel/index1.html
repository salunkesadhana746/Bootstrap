<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div id="carouselExampleCaptions" class="carousel slide">

        <div class="carousel-inner">
            <div class="carousel-item active ">
                <img src="assets/image/img-1.webp" class="d-block w-100" alt="...">
                <div class="carousel-caption d-none d-md-block">
                    <h1>Your world of joy</h1>
                    <p>From local escapes to far-flung adventures, find what makes you happy anytime, anywhere</p>
                    <div class="d-flex justify-content-center  bg-body border col-7 gap-3 rounded">
                        <div class="d-flex justify-content-between w-100 align-items-center">
                            <div class="fw-medium text-secondary p-2 w-50"><i class="ri-search-line"><input
                                        class="border-0" type="text" placeholder="teamlab planets tokyo ticket"></i>
                            </div>
                            <button style="background-color: #FF5B00; color: white;" type="button"
                                class="btn fw-bold py-2 px-3 rounded btn-light">Search</button>
                        </div>
                    </div>
                    >
                </div>

            </div>
        </div>
    </div>
    <div class="carousel-item">
        <img src="assets/image/img-2.webp" class="d-block w-100" alt="...">
        <div class="carousel-caption d-none d-md-block">
            <h5>Second slide label</h5>
            <p>Some representative placeholder content for the second slide.</p>
        </div>
    </div>
    </div>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
    </button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
