<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Day-1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

</head>

<body>

    <main class="container-fluid">

                <h1>Our Teams</h1>
                <p>Meet our professional team members</p>
            </div>

            <div class="row justify-content-center text-center p-2 m-3">
                <div class="col-xxl-3 col-xl-3 col-lg-4 col-md-6 col-sm-12 my-3">
                    <div class="card shadow-sm text-center my-3" style="width: 18rem;">
                        <img src="https://i.pinimg.com/736x/8e/40/f8/8e40f83a0f6b6f2e66803af56507b05d.jpg" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Jonh Doe</h5>
                            <p>Frontend Developer</p>
                        </div>
                    </div>
                </div>
                <div class="col-xxl-3 col-xl-3 col-lg-4 col-md-6 col-sm-12 my-3">
                    <div class="card shadow-sm text-center my-3" style="width: 18rem;">
                        <img src="https://i.pinimg.com/736x/13/39/76/133976ec44b445a4732f43f63d3a241b.jpg" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Jane Smith</h5>
                            <p>UI Designer</p>
                        </div>
                    </div>
                </div>
                <div class="col-xxl-3 col-xl-3 col-lg-4 col-md-6 col-sm-12 my-3">
                    <div class="card shadow-sm text-center my-3" style="width: 18rem;">
                        <img src="https://i.pinimg.com/736x/8c/6d/db/8c6ddb5fe6600fcc4b183cb2ee228eb7.jpg" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Alex Brown</h5>
                            <p>Backend Developer</p>
                        </div>
                    </div> 
                </div>
                <div class="col-xxl-3 col-xl-3 col-lg-4 col-md-6 col-sm-12 my-3">
                    <div class="card shadow-sm text-center my-3" style="width: 18rem;">
                        <img src="https://i.pinimg.com/736x/ea/c6/2a/eac62a5461dd445c7abcfe3a413fefa1.jpg" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Emily Davis</h5>
                            <p>Project Manager</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"

</html>
