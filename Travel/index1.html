<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Travel Hero</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div id="travelSlider" class="carousel slide carousel-fade" data-bs-ride="carousel">

        <div class="carousel-inner">

            <!-- Slide 1 -->
            <div class="carousel-item active">

                <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1600" class="d-block w-100"
                    style="height:700px; object-fit:cover;">

            </div>

            <!-- Slide 2 -->
            <div class="carousel-item">

                <img src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=1600" class="d-block w-100"
                    style="height:700px; object-fit:cover;">

            </div>

            <!-- Slide 3 -->
            <div class="carousel-item">

                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600" class="d-block w-100"
                    style="height:700px; object-fit:cover;">

            </div>

        </div>

        <div class="carousel-caption d-flex flex-column justify-content-center h-100">

            <div class="container">

                <h1 class="display-2 fw-bold">
                    Your world of joy
                </h1>

                <p class="lead mb-5">
                    From local escapes to far-flung adventures,
                    find what makes you happy anytime, anywhere.
                </p>

                <div class="row justify-content-center">

                    <div class="col-lg-8">

                        <div class="input-group input-group-lg shadow">

                            <input type="text" class="form-control" placeholder="Universal Studios Japan">

                            <button class="btn btn-warning px-5 fw-bold">
                                Search
                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#travelSlider" data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>

        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#travelSlider" data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>

        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
